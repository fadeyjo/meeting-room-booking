services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meeting_room
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3307:3306"
    volumes:
      - ./init_db/00-use-db.sql:/docker-entrypoint-initdb.d/00-use-db.sql:ro
      - ./init_db/script.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./init_db/02-seed-admin.sql:/docker-entrypoint-initdb.d/02-seed-admin.sql:ro
      - ./init_db/03-seed-rooms.sql:/docker-entrypoint-initdb.d/03-seed-rooms.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: backend/services/auth-service/Dockerfile
    environment:
      PORT: 5000
      DATABASE_URL: mysql://app:app@db:3306/meeting_room
      JWT_ACCESS_SECRET: access-secret-change-in-production
      JWT_REFRESH_SECRET: refresh-secret-change-in-production
      JWT_ACCESS_EXPIRE_M: 15
      JWT_REFRESH_EXPIRE_D: 7
    depends_on:
      db:
        condition: service_healthy

  seed-users:
    image: node:20-alpine
    environment:
      AUTH_SERVICE_URL: http://auth-service:5000
      BOOKINGS_SERVICE_URL: http://bookings-service:5000
      ROOMS_SERVICE_URL: http://rooms-service:5000
      INVITATIONS_SERVICE_URL: http://invitations-service:5000
      ADMIN_EMAIL: admin@mail.ru
      ADMIN_PASSWORD: admin-777
    volumes:
      - ./scripts:/scripts:ro
    working_dir: /scripts
    command: node seed-users.js
    depends_on:
      - auth-service
      - bookings-service
      - rooms-service
      - invitations-service
    restart: "no"

  rooms-service:
    build:
      context: .
      dockerfile: backend/services/rooms-service/Dockerfile
    environment:
      PORT: 5000
      DATABASE_URL: mysql://app:app@db:3306/meeting_room
      JWT_ACCESS_SECRET: access-secret-change-in-production
      JWT_REFRESH_SECRET: refresh-secret-change-in-production
      JWT_ACCESS_EXPIRE_M: 15
      JWT_REFRESH_EXPIRE_D: 7
    depends_on:
      db:
        condition: service_healthy

  bookings-service:
    build:
      context: .
      dockerfile: backend/services/bookings-service/Dockerfile
    environment:
      PORT: 5000
      DATABASE_URL: mysql://app:app@db:3306/meeting_room
      JWT_ACCESS_SECRET: access-secret-change-in-production
      JWT_REFRESH_SECRET: refresh-secret-change-in-production
      JWT_ACCESS_EXPIRE_M: 15
      JWT_REFRESH_EXPIRE_D: 7
    depends_on:
      db:
        condition: service_healthy

  invitations-service:
    build:
      context: .
      dockerfile: backend/services/invitations-service/Dockerfile
    environment:
      PORT: 5000
      DATABASE_URL: mysql://app:app@db:3306/meeting_room
      JWT_ACCESS_SECRET: access-secret-change-in-production
      JWT_REFRESH_SECRET: refresh-secret-change-in-production
      JWT_ACCESS_EXPIRE_M: 15
      JWT_REFRESH_EXPIRE_D: 7
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - rooms-service
      - invitations-service
      - bookings-service